# OmniRoute - Docker Compose for Coolify
#
# Usage in Coolify:
# 1) Create a Docker Compose application and point it to this repository.
# 2) Use this file as the compose definition.
# 3) Configure required environment variables in Coolify:
#    - JWT_SECRET
#    - API_KEY_SECRET
#    - INITIAL_PASSWORD
#    - NEXT_PUBLIC_BASE_URL (your public https URL)
#    - BASE_URL (same public URL or internal URL as needed)
#
# Notes:
# - Coolify usually handles ingress/proxy automatically, so this file uses expose
#   instead of host port bindings.
# - Data is persisted in /app/data via the named volume below.

services:
  omniroute:
    container_name: omniroute-coolify
    image: ghcr.io/hotopensourcing/omniroute:latest
    restart: unless-stopped
    stop_grace_period: 40s
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0

      # Runtime ports
      PORT: ${PORT:-20128}
      DASHBOARD_PORT: ${DASHBOARD_PORT:-${PORT:-20128}}
      API_PORT: ${API_PORT:-20129}
      API_HOST: ${API_HOST:-0.0.0.0}

      # Persistent data location in container
      DATA_DIR: /app/data

      # Public URLs (important for OAuth callbacks and dashboard links)
      BASE_URL: ${BASE_URL:-http://localhost:${PORT:-20128}}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:${PORT:-20128}}

      # Security defaults for reverse-proxy deployments
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      REQUIRE_API_KEY: ${REQUIRE_API_KEY:-false}

      # Required secrets (set in Coolify environment variables)
      JWT_SECRET: ${JWT_SECRET}
      API_KEY_SECRET: ${API_KEY_SECRET}
      INITIAL_PASSWORD: ${INITIAL_PASSWORD:-CHANGEME}

      # Optional storage encryption
      STORAGE_ENCRYPTION_KEY: ${STORAGE_ENCRYPTION_KEY:-}
      STORAGE_ENCRYPTION_KEY_VERSION: ${STORAGE_ENCRYPTION_KEY_VERSION:-v1}

      # Background services
      PROVIDER_LIMITS_SYNC_INTERVAL_MINUTES: ${PROVIDER_LIMITS_SYNC_INTERVAL_MINUTES:-70}
      OMNIROUTE_DISABLE_BACKGROUND_SERVICES: ${OMNIROUTE_DISABLE_BACKGROUND_SERVICES:-false}

      # Redis cache / queue backend
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Qdrant vector database for memory/RAG
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_GRPC_PORT: ${QDRANT_GRPC_PORT:-6334}

      # Performance & Caching Optimizations
      # Semantic cache for LLM responses (reduces cost/latency for temp=0 requests)
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_TTL: ${CACHE_TTL:-300000}
      CACHE_MAX_SIZE: ${CACHE_MAX_SIZE:-100}
      CACHE_MAX_BYTES: ${CACHE_MAX_BYTES:-10485760}

      # Memory system backend (use Qdrant for better performance)
      MEMORY_VECTOR_STORE: ${MEMORY_VECTOR_STORE:-qdrant}
      MEMORY_EMBEDDING_MODEL: ${MEMORY_EMBEDDING_MODEL:-openai/text-embedding-3-small}

      # Upstream timeouts (tune for your network/providers)
      FETCH_TIMEOUT_MS: ${FETCH_TIMEOUT_MS:-60000}
      STREAM_IDLE_TIMEOUT_MS: ${STREAM_IDLE_TIMEOUT_MS:-30000}
      STREAM_READINESS_TIMEOUT_MS: ${STREAM_READINESS_TIMEOUT_MS:-10000}

      # Connection pooling & resilience
      CREDENTIAL_HEALTH_CHECK_INTERVAL: ${CREDENTIAL_HEALTH_CHECK_INTERVAL:-300000}
      
      # Disable expensive operations in production if not needed
      OMNIROUTE_SKIP_DB_HEALTHCHECK: ${OMNIROUTE_SKIP_DB_HEALTHCHECK:-0}
      OMNIROUTE_DB_HEALTHCHECK_INTERVAL_MS: ${OMNIROUTE_DB_HEALTHCHECK_INTERVAL_MS:-21600000}

    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

    expose:
      - "${PORT:-20128}"
      - "${API_PORT:-20129}"

    ports:
      - "${PORT:-20128}:${PORT:-20128}"
      - "${API_PORT:-20129}:${API_PORT:-20129}"

    volumes:
      - omniroute-coolify-data:/app/data

    healthcheck:
      test: ["CMD", "node", "healthcheck.mjs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    container_name: redis-coolify
    image: redis:8.6.2-alpine
    restart: unless-stopped
    stop_grace_period: 10s
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 300
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
      --replica-lazy-flush yes
      --lazyfree-lazy-user-del yes
    expose:
      - "6379"
    volumes:
      - redis-coolify-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  qdrant:
    container_name: qdrant-coolify
    image: qdrant/qdrant:latest
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
      QDRANT__SERVICE__GRPC_PORT: ${QDRANT_GRPC_PORT:-6334}
      QDRANT__LOG_LEVEL: ${QDRANT_LOG_LEVEL:-INFO}
      # Performance tuning
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS: ${QDRANT_MAX_SEARCH_THREADS:-4}
      QDRANT__STORAGE__OPTIMIZERS__DEFAULT_SEGMENT_NUMBER: ${QDRANT_DEFAULT_SEGMENT_NUMBER:-2}
      QDRANT__STORAGE__OPTIMIZERS__INDEXING_THRESHOLD_KB: ${QDRANT_INDEXING_THRESHOLD_KB:-20000}
      QDRANT__STORAGE__WAL__WAL_CAPACITY_MB: ${QDRANT_WAL_CAPACITY_MB:-32}
      # Memory optimization
      QDRANT__STORAGE__PERFORMANCE__MAX_OPTIMIZATION_THREADS: ${QDRANT_MAX_OPTIMIZATION_THREADS:-2}
    expose:
      - "6333"  # HTTP API
      - "6334"  # gRPC API
    volumes:
      - qdrant-coolify-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/readyz || exit 1"]
      interval: 15s
      timeout: 15s
      retries: 15
      start_period: 90s

volumes:
  omniroute-coolify-data:
    name: omniroute-coolify-data
  redis-coolify-data:
    name: redis-coolify-data
  qdrant-coolify-data:
    name: qdrant-coolify-data
