name: Deploy to Coolify

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: vars.DEPLOY_ENABLED == 'true'
    name: Deploy OmniRoute to Coolify
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Webhook
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          CF_ACCESS_TOKEN: ${{ secrets.CF_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          
          echo "=== Triggering Coolify deployment ==="
          
          # Verify webhook URL is set
          if [ -z "${COOLIFY_WEBHOOK_URL}" ]; then
            echo "❌ ERROR: COOLIFY_WEBHOOK_URL secret is not set"
            echo "Please configure it in: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          
          # Build headers
          HEADERS=(-H "Content-Type: application/json" -H "User-Agent: GitHub-Actions-Deploy/1.0")
          
          # Add token to URL or headers based on what's provided
          if [ -n "${COOLIFY_TOKEN:-}" ]; then
            # Try Bearer token in Authorization header first
            HEADERS+=(-H "Authorization: Bearer ${COOLIFY_TOKEN}")
            WEBHOOK_URL="${COOLIFY_WEBHOOK_URL}"
            echo "Webhook URL: ${COOLIFY_WEBHOOK_URL}"
            echo "Using Bearer token authentication"
          else
            WEBHOOK_URL="${COOLIFY_WEBHOOK_URL}"
            echo "Webhook URL: ${COOLIFY_WEBHOOK_URL}"
          fi
          
          # Add Cloudflare bypass token if available (optional)
          if [ -n "${CF_ACCESS_TOKEN:-}" ]; then
            HEADERS+=(-H "CF-Access-Token: ${CF_ACCESS_TOKEN}")
            echo "Using Cloudflare Access Token for bypass"
          fi
          
          # Trigger the webhook deployment
          HTTP_CODE=$(curl -s -X GET "${WEBHOOK_URL}" \
            "${HEADERS[@]}" \
            -w "%{http_code}" \
            -o /tmp/response.txt)
          
          BODY=$(cat /tmp/response.txt 2>/dev/null || echo "")
          
          echo "HTTP Status Code: $HTTP_CODE"
          echo "Response Body: $BODY"
          
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Deployment triggered successfully (HTTP $HTTP_CODE)"
          else
            echo "❌ Failed to trigger deployment (HTTP $HTTP_CODE)"
            echo ""
            echo "Common causes:"
            echo "  - Incorrect webhook URL (check Coolify dashboard)"
            echo "  - Wrong application UUID in the URL"
            echo "  - Coolify instance not accessible from GitHub runners"
            echo "  - Webhook disabled in Coolify"
            exit 1
          fi
          
          echo ""
          echo "=== Deployment triggered - Coolify will handle the build and health checks ==="
          echo "⚠️  Note: This workflow only triggers the deployment."
          echo "    Monitor deployment progress and health in your Coolify dashboard."
