name: Deploy to Coolify

on:
  workflow_run:
    workflows: ["Publish to Docker Hub"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
      && vars.DEPLOY_ENABLED == 'true'
    name: Deploy OmniRoute to Coolify
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Webhook
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          
          echo "=== Triggering Coolify deployment ==="
          
          # Trigger the webhook deployment
          RESPONSE=$(curl -sf -X GET "${COOLIFY_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -w "\n%{http_code}" || echo "000")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Deployment triggered successfully (HTTP $HTTP_CODE)"
            echo "Response: $BODY"
          else
            echo "❌ Failed to trigger deployment (HTTP $HTTP_CODE)"
            echo "Response: $BODY"
            exit 1
          fi
          
          echo "=== Deployment triggered - Coolify will handle the build and health checks ==="
          echo "⚠️  Note: This workflow only triggers the deployment."
          echo "    Monitor deployment progress and health in your Coolify dashboard."
